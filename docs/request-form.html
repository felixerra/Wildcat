  <div class="container" style="border: 1px solid #000;">
    <div class="row justify-content-center" style="background-color: white;">
    <h1 class="page-header">Book Request Form</h1>
    <form target="_blank" action="https://formsubmit.co/lending@wildcatlibrary.net" method="POST">
      <div class="form-group">
        <div class="form-row">
          <div class="col">
            <label for="name" class="form-label">Name</label>
            <input type="text" name="name" class="form-control" placeholder="First L." required>
          </div>
          <div class="col">
            <label for="email" class="form-label">Email address</label>
            <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
          </div>
          <div class="col">
            <label for="tel" class="form-label">Phone Number (optional)</label>
            <input type="tel" name="tel" class="form-control" placeholder="(555)555-5555">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label for="book" class="form-label">Book(s) Requested</label>
        <textarea class="form-control" name="book" placeholder="Title by Author" required></textarea>
      </div>
      <div class="form-group">
        <label for="message" class="form-label">Message</label>
        <textarea placeholder="Questions, comments, inquiry?" class="form-control" name="message" rows="10"></textarea>
      </div>
      <button type="submit" class="btn btn-lg btn-dark btn-block">Submit Form</button>
    </form>
    </div>
  </div>
